<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MN BG LTU - VAR Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-950 p-6 font-sans text-stone-300">

    <div class="max-w-2xl mx-auto bg-stone-900 p-6 rounded-xl border border-amber-600 shadow-2xl">
        <h1 class="text-2xl font-black mb-2 text-amber-500 uppercase tracking-tighter">VAR / Match Simulator</h1>
        <p class="text-xs text-stone-500 uppercase tracking-widest mb-6">Force Match Results & Trigger Score Calculation</p>

        <div class="space-y-4 mb-6">
            <input type="text" id="dbUrl" class="w-full bg-stone-950 border border-stone-700 p-2 rounded text-stone-200 text-xs font-mono" placeholder="Supabase URL (https://...)">
            <input type="password" id="dbKey" class="w-full bg-stone-950 border border-stone-700 p-2 rounded text-stone-200 text-xs font-mono" placeholder="SERVICE_ROLE Key (eyJh...)">
            <button onclick="loadMatches()" class="w-full bg-stone-800 border border-stone-700 text-stone-300 hover:text-white p-2 rounded font-bold text-xs uppercase transition-colors">1. Connect & Load Matches</button>
        </div>

        <div id="simulation-area" class="hidden space-y-4 p-4 border border-stone-800 rounded-lg bg-stone-950">
            <select id="matchSelect" class="w-full bg-stone-900 border border-stone-700 p-2 rounded text-stone-200 text-xs font-bold"></select>
            
            <div class="flex items-center justify-center gap-4">
                <input type="number" id="homeScore" class="w-16 bg-stone-900 border border-stone-700 p-2 rounded text-center text-xl font-black text-white" placeholder="0">
                <span class="text-stone-500 font-black">:</span>
                <input type="number" id="awayScore" class="w-16 bg-stone-900 border border-stone-700 p-2 rounded text-center text-xl font-black text-white" placeholder="0">
            </div>

            <div class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="simulateMatch()" class="bg-amber-600 text-white p-3 rounded font-black text-xs uppercase shadow-lg hover:bg-amber-500 transition-colors">2. Simulate Final Whistle</button>
                <button onclick="resetMatch()" class="bg-stone-800 border border-stone-700 text-stone-500 p-3 rounded font-bold text-xs uppercase hover:text-white transition-colors">Undo / Reset Match</button>
            </div>
        </div>

        <div class="mt-6 bg-black p-4 rounded border border-stone-700 h-64 overflow-y-auto font-mono text-[11px]" id="console">
            <span class="text-stone-500">Awaiting Service Role connection...</span><br>
        </div>
    </div>

    <script>
        let db = null;

        function log(msg, type='info') {
            const cons = document.getElementById('console');
            let color = 'text-stone-300';
            if(type === 'success') color = 'text-green-500 font-bold'; 
            if(type === 'warning') color = 'text-amber-500 font-bold';
            cons.innerHTML += `<span class="${color}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>`;
            cons.scrollTop = cons.scrollHeight;
        }

        async function loadMatches() {
            const url = document.getElementById('dbUrl').value;
            const key = document.getElementById('dbKey').value;
            if(!url || !key) return log('URL or Key missing!', 'warning');
            
            db = supabase.createClient(url, key);
            log('Connected via Service Role. Fetching matches...');

            const { data, error } = await db.from('matches').select('id, home_team, away_team, status').order('kickoff', { ascending: true });
            
            if (error) return log(`Error: ${error.message}`, 'warning');
            
            const select = document.getElementById('matchSelect');
            select.innerHTML = '';
            data.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.text = `${m.home_team} vs ${m.away_team} (${m.status})`;
                select.appendChild(opt);
            });

            document.getElementById('simulation-area').classList.remove('hidden');
            log(`Loaded ${data.length} matches.`);
        }

        async function simulateMatch() {
            const matchId = document.getElementById('matchSelect').value;
            const homeScore = parseInt(document.getElementById('homeScore').value);
            const awayScore = parseInt(document.getElementById('awayScore').value);

            if (isNaN(homeScore) || isNaN(awayScore)) return log('Please enter valid scores!', 'warning');

            log(`--- SIMULATING MATCH ${matchId} AS FINISHED (${homeScore}:${awayScore}) ---`);

            // 1. Update Match in DB
            await db.from('matches').update({ status: 'FINISHED', home_score: homeScore, away_score: awayScore }).eq('id', matchId);
            log('Match marked as FINISHED.');

            // 2. Fetch predictions
            const { data: predictions } = await db.from('predictions').select('*').eq('match_id', matchId).eq('points_earned', 0);
            
            if (!predictions || predictions.length === 0) {
                return log('No pending predictions found for this match.');
            }

            log(`Found ${predictions.length} predictions to calculate...`);

            // 3. Exact same logic as your Node.js Bot
            let exactCount = 0;
            let tendencyCount = 0;

            for (const pred of predictions) {
                let points = 0;
                const isExact = (pred.home_pred === homeScore && pred.away_pred === awayScore);
                const isTendency = (Math.sign(pred.home_pred - pred.away_pred) === Math.sign(homeScore - awayScore));

                if (isExact) { points = 3; exactCount++; }
                else if (isTendency) { points = 1; tendencyCount++; }

                if (points > 0) {
                    // Update Prediction
                    await db.from('predictions').update({ points_earned: points }).eq('id', pred.id);
                    // Update Player Score
                    const { data: player } = await db.from('players').select('score').eq('id', pred.player_id).single();
                    await db.from('players').update({ score: player.score + points }).eq('id', pred.player_id);
                } else {
                    // Even if 0 points, we mark it as processed (optional, but good for tracking)
                    await db.from('predictions').update({ points_earned: 0 }).eq('id', pred.id);
                }
            }

            log(`CALCULATION COMPLETE: ${exactCount} Exact Hits (3pts), ${tendencyCount} Tendency Hits (1pt).`, 'success');
            log('Open your App Dashboard to see the updated scores and leaderboard!');
        }

        async function resetMatch() {
            const matchId = document.getElementById('matchSelect').value;
            log(`--- RESETTING MATCH ${matchId} ---`, 'warning');

            // 1. Get all predictions that earned points for this match
            const { data: predictions } = await db.from('predictions').select('*').eq('match_id', matchId).gt('points_earned', 0);

            if (predictions && predictions.length > 0) {
                log(`Subtracting points from ${predictions.length} players...`);
                for (const pred of predictions) {
                    const { data: player } = await db.from('players').select('score').eq('id', pred.player_id).single();
                    await db.from('players').update({ score: player.score - pred.points_earned }).eq('id', pred.player_id);
                    await db.from('predictions').update({ points_earned: 0 }).eq('id', pred.id);
                }
            }

            // 2. Set match back to scheduled
            await db.from('matches').update({ status: 'TIMED', home_score: null, away_score: null }).eq('id', matchId);
            log('Match reset to SCHEDULED. Points deducted.', 'success');
        }
    </script>
</body>
</html>
